name: Build container image

on:
  pull_request:
    branches: [ main ]
  workflow_dispatch:
  repository_dispatch:
    types: [build_push]

env:
  IMAGE_DESC: "RakuOS COSMIC"
  IMAGE_KEYWORDS: "bootc,fedora,atomic"
  IMAGE_LOGO_URL: "https://avatars.githubusercontent.com/u/242534976?s=200&v=4"
  IMAGE_NAME: "${{ github.event.repository.name }}"
  IMAGE_REGISTRY: "ghcr.io/${{ github.repository_owner }}"
  DEFAULT_TAG: "latest"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}
  cancel-in-progress: true

jobs:
  build_push:
    name: Build (${{ matrix.variant }})
    runs-on: ubuntu-24.04

    strategy:
      fail-fast: false
      matrix:
        variant:
          - base
          - nvidia

    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Prepare environment
        run: |
          echo "IMAGE_REGISTRY=${IMAGE_REGISTRY,,}" >> $GITHUB_ENV
          echo "IMAGE_NAME=${IMAGE_NAME,,}" >> $GITHUB_ENV

      - name: Resolve branch
        id: branch
        env:
          SOURCE_BRANCH: ${{ github.event_name == 'repository_dispatch' && github.event.client_payload.source_branch || github.ref_name }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          BRANCH_SLUG="$(echo "${SOURCE_BRANCH}" | tr '[:upper:]' '[:lower:]' | sed 's#[^a-z0-9._-]#-#g')"
          echo "source_branch=${SOURCE_BRANCH}" >> "$GITHUB_OUTPUT"
          echo "branch_slug=${BRANCH_SLUG}" >> "$GITHUB_OUTPUT"
          if [[ "${SOURCE_BRANCH}" == "${DEFAULT_BRANCH}" ]]; then
            BASE_IMAGE_TAG="${{ env.DEFAULT_TAG }}"
          else
            BASE_IMAGE_TAG="${BRANCH_SLUG}"
          fi
          echo "base_image_tag=${BASE_IMAGE_TAG}" >> "$GITHUB_OUTPUT"
          if [[ "${SOURCE_BRANCH}" == "${DEFAULT_BRANCH}" ]]; then
            {
              echo "tag_lines<<EOF"
              echo "type=raw,value=${{ env.DEFAULT_TAG }}"
              echo "type=raw,value=${{ env.DEFAULT_TAG }}.{{date 'YYYYMMDD'}}"
              echo "type=raw,value={{date 'YYYYMMDD'}}"
              echo "type=sha,enable=${{ github.event_name == 'pull_request' }}"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
            echo "version_label=${{ env.DEFAULT_TAG }}.{{date 'YYYYMMDD'}}" >> "$GITHUB_OUTPUT"
          else
            {
              echo "tag_lines<<EOF"
              echo "type=raw,value=${BRANCH_SLUG}"
              echo "type=raw,value=${BRANCH_SLUG}.{{date 'YYYYMMDD'}}"
              echo "type=sha,enable=${{ github.event_name == 'pull_request' }}"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
            echo "version_label=${BRANCH_SLUG}.{{date 'YYYYMMDD'}}" >> "$GITHUB_OUTPUT"
          fi

      - name: Set variant variables
        run: |
          if [ "${{ matrix.variant }}" = "base" ]; then
            echo "FINAL_IMAGE_NAME=${IMAGE_NAME}" >> $GITHUB_ENV
          else
            echo "FINAL_IMAGE_NAME=${IMAGE_NAME}-nvidia" >> $GITHUB_ENV
          fi
          echo "VARIANT=${{ matrix.variant }}" >> $GITHUB_ENV

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.branch.outputs.source_branch }}

      - name: Maximize build space
        uses: ublue-os/remove-unwanted-software@v1

      - name: Get current date
        id: date
        run: echo "date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_OUTPUT

      - name: Image Metadata
        uses: docker/metadata-action@v5
        id: metadata
        with:
          tags: ${{ steps.branch.outputs.tag_lines }}
          labels: |
            io.artifacthub.package.readme-url=https://raw.githubusercontent.com/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}/${{ github.sha }}/README.md
            org.opencontainers.image.created=${{ steps.date.outputs.date }}
            org.opencontainers.image.description=${{ env.IMAGE_DESC }}
            org.opencontainers.image.documentation=https://raw.githubusercontent.com/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}/${{ github.sha }}/README.md
            org.opencontainers.image.source=https://github.com/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}/blob/${{ github.sha }}/Containerfile
            org.opencontainers.image.title=${{ env.FINAL_IMAGE_NAME }}
            org.opencontainers.image.url=https://github.com/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}/tree/${{ github.sha }}
            org.opencontainers.image.vendor=${{ github.repository_owner }}
            org.opencontainers.image.version=${{ steps.branch.outputs.version_label }}
            io.artifacthub.package.deprecated=false
            io.artifacthub.package.keywords=${{ env.IMAGE_KEYWORDS }}
            io.artifacthub.package.license=Apache-2.0
            io.artifacthub.package.logo-url=${{ env.IMAGE_LOGO_URL }}
            io.artifacthub.package.prerelease=false
            containers.bootc=1
          sep-tags: " "
          sep-annotations: " "

      - name: Build Image
        id: build_image
        uses: redhat-actions/buildah-build@v2
        with:
          containerfiles: ${{ matrix.variant == 'nvidia' && './Containerfile.nvidia' || './Containerfile' }}
          image: ${{ env.FINAL_IMAGE_NAME }}
          tags: ${{ steps.metadata.outputs.tags }}
          labels: ${{ steps.metadata.outputs.labels }}
          build-args: |
            BASE_IMAGE_TAG=${{ steps.branch.outputs.base_image_tag }}
          oci: false

      - name: Login to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push to GHCR
        if: github.event_name != 'pull_request'
        uses: redhat-actions/push-to-registry@v2
        with:
          registry: ${{ env.IMAGE_REGISTRY }}
          image: ${{ env.FINAL_IMAGE_NAME }}
          tags: ${{ steps.metadata.outputs.tags }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}


      # This section is optional and only needs to be enabled if you plan on distributing
      # your project for others to consume. You will need to create a public and private key
      # using Cosign and save the private key as a repository secret in Github for this workflow
      # to consume. For more details, review the image signing section of the README.
      - name: Install Cosign
        uses: sigstore/cosign-installer@faadad0cce49287aee09b3a48701e75088a2c6ad # v4.0.0
        if: github.event_name != 'pull_request'
        with:
          cosign-release: 'v2.6.1'

      - name: Sign container image
        if: github.event_name != 'pull_request'
        run: |
          IMAGE_FULL="${{ env.IMAGE_REGISTRY }}/${{ env.FINAL_IMAGE_NAME }}"
          for tag in ${{ steps.metadata.outputs.tags }}; do
            cosign sign -y --key env://COSIGN_PRIVATE_KEY $IMAGE_FULL:$tag
          done
        env:
          TAGS: ${{ steps.push.outputs.digest }}
          COSIGN_EXPERIMENTAL: false
          COSIGN_PRIVATE_KEY: ${{ secrets.SIGNING_SECRET }}
