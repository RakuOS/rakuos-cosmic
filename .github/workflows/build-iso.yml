name: Build ISOs

on:
  #schedule:
  #  - cron: '05 10 */14 * 2'
  workflow_dispatch:
    inputs:
      platform:
        required: true
        type: choice
        options:
          - amd64
          - arm64
  pull_request:
    branches:
      - main

env:
  IMAGE_NAME: ${{ github.event.repository.name }}
  IMAGE_REGISTRY: "ghcr.io/${{ github.repository_owner }}"
  DEFAULT_TAG: "latest"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}
  cancel-in-progress: true

jobs:
  build:
    name: Build ${{ matrix.variant }} ISO
    runs-on: ${{ inputs.platform == 'amd64' && 'ubuntu-24.04' || 'ubuntu-24.04-arm' }}

    strategy:
      fail-fast: false
      matrix:
        variant: [standard, nvidia]

    permissions:
      contents: write
      packages: write
      id-token: write

    steps:
      - name: Prepare environment
        run: |
          echo "IMAGE_REGISTRY=${IMAGE_REGISTRY,,}" >> ${GITHUB_ENV}
          echo "IMAGE_NAME=${IMAGE_NAME,,}" >> ${GITHUB_ENV}
          echo "USER_UID=$(id -u)" >> ${GITHUB_ENV}
          echo "USER_GID=$(id -g)" >> ${GITHUB_ENV}

      - name: Resolve branch
        id: branch
        env:
          SOURCE_BRANCH: ${{ github.ref_name }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          BRANCH_SLUG="$(echo "${SOURCE_BRANCH}" | tr '[:upper:]' '[:lower:]' | sed 's#[^a-z0-9._-]#-#g')"
          echo "branch_slug=${BRANCH_SLUG}" >> "$GITHUB_OUTPUT"
          if [[ "${SOURCE_BRANCH}" == "${DEFAULT_BRANCH}" ]]; then
            echo "image_tag=${{ env.DEFAULT_TAG }}" >> "$GITHUB_OUTPUT"
            echo "is_stable=true" >> "$GITHUB_OUTPUT"
          else
            echo "image_tag=${BRANCH_SLUG}" >> "$GITHUB_OUTPUT"
            echo "is_stable=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install dependencies (ARM only)
        if: inputs.platform == 'arm64'
        run: |
          sudo apt update -y
          sudo apt install -y podman

      - name: Maximize build space
        if: inputs.platform != 'arm64'
        uses: ublue-os/remove-unwanted-software@cc0becac701cf642c8f0a6613bbdaf5dc36b259e
        with:
          remove-codeql: true

      - name: Checkout
        uses: actions/checkout@v4

      # 🔥 Build ISO using titanoboa
      - name: Build ISO
        id: build
        uses: RakuOS/titanoboa@main
        with:
          image-ref: ghcr.io/rakuos/${{ env.IMAGE_NAME }}${{ matrix.variant == 'nvidia' && '-nvidia' || '' }}:${{ steps.branch.outputs.image_tag }}
          hook-post-rootfs: ${{ github.workspace }}/config/configure-iso.sh
          hook-pre-initramfs: ${{ github.workspace }}/config/pre_initramfs.sh
          compression: squashfs
          builder-distro: fedora

      # 🔥 Rename ISO with UTC date
      - name: Rename ISO
        if: github.event_name != 'pull_request'
        shell: bash
        run: |
          BUILD_DATE=$(date -u +%Y.%m.%d)
          if [[ "${{ matrix.variant }}" == "nvidia" ]]; then SUFFIX="-nvidia"; else SUFFIX=""; fi
          mkdir -p output
          if [[ "${{ steps.branch.outputs.is_stable }}" == "true" ]]; then
            NEW_NAME="rakuos-cosmic${SUFFIX}-${BUILD_DATE}-${{ inputs.platform }}.iso"
            LATEST_NAME="rakuos-cosmic${SUFFIX}-latest-${{ inputs.platform }}.iso"
          else
            NEW_NAME="rakuos-cosmic${SUFFIX}-${{ steps.branch.outputs.branch_slug }}-${BUILD_DATE}-${{ inputs.platform }}.iso"
            LATEST_NAME="rakuos-cosmic${SUFFIX}-${{ steps.branch.outputs.branch_slug }}-latest-${{ inputs.platform }}.iso"
          fi
          mv ${{ steps.build.outputs.iso-dest }} output/${NEW_NAME}
          cp output/${NEW_NAME} output/${LATEST_NAME}
          echo "NEW_ISO_NAME=${NEW_NAME}" >> $GITHUB_ENV
          echo "LATEST_ISO_NAME=${LATEST_NAME}" >> $GITHUB_ENV
          echo "BUILD_DATE=${BUILD_DATE}" >> $GITHUB_ENV

      # 🔥 Generate SHA256 checksums
      - name: Generate SHA256 checksum
        if: github.event_name != 'pull_request'
        shell: bash
        run: |
          if [[ "${{ matrix.variant }}" == "nvidia" ]]; then SUFFIX="-nvidia"; else SUFFIX=""; fi
          cd output
          sha256sum "$NEW_ISO_NAME" > "$NEW_ISO_NAME.sha256"
          sha256sum "$LATEST_ISO_NAME" > "$LATEST_ISO_NAME.sha256"

      # 📦 Upload artifacts to GitHub
      - name: Upload disk images and checksum to Job Artifacts
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: rakuos-cosmic-${{ steps.branch.outputs.branch_slug }}-${{ matrix.variant }}-${{ inputs.platform }}
          path: |
            output/${{ env.NEW_ISO_NAME }}
            output/${{ env.NEW_ISO_NAME }}.sha256
          if-no-files-found: error
          retention-days: 7
          compression-level: 0
          overwrite: true

      # 🌐 Connect to ZeroTier
      - name: Join ZeroTier Network
        if: github.event_name != 'pull_request'
        uses: zerotier/github-action@v1
        with:
          network_id: ${{ secrets.ZEROTIER_NETWORK_ID }}
          auth_token: ${{ secrets.ZEROTIER_CENTRAL_TOKEN }}

      # ⏳ Wait for ZeroTier interface
      - name: Wait for ZeroTier IP
        if: github.event_name != 'pull_request'
        run: |
          sleep 10
          ip addr show
          ping -c 3 ${{ secrets.SFTP_HOST }}

      # 🗑️ Remove previous ISOs from server
      - name: Remove previous ISOs from server
        if: github.event_name != 'pull_request'
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SFTP_HOST }}
          username: ${{ secrets.SFTP_USERNAME }}
          password: ${{ secrets.SFTP_PASSWORD }}
          script: |
            SUFFIX=""
            [[ "${{ matrix.variant }}" == "nvidia" ]] && SUFFIX="-nvidia"
            cd "${{ secrets.SFTP_TARGET }}"
            if [[ "${{ steps.branch.outputs.is_stable }}" == "true" ]]; then
              rm -f rakuos-cosmic${SUFFIX}-[0-9]*-${{ inputs.platform }}.iso
              rm -f rakuos-cosmic${SUFFIX}-[0-9]*-${{ inputs.platform }}.iso.sha256
              rm -f rakuos-cosmic${SUFFIX}-latest-${{ inputs.platform }}.iso
              rm -f rakuos-cosmic${SUFFIX}-latest-${{ inputs.platform }}.iso.sha256
            else
              rm -f rakuos-cosmic${SUFFIX}-${{ steps.branch.outputs.branch_slug }}-*-${{ inputs.platform }}.iso
              rm -f rakuos-cosmic${SUFFIX}-${{ steps.branch.outputs.branch_slug }}-*-${{ inputs.platform }}.iso.sha256
            fi

      # 🚀 Upload to SFTP
      - name: SFTP upload via ZeroTier
        if: github.event_name != 'pull_request'
        uses: Dylan700/sftp-upload-action@latest
        with:
          server: ${{ secrets.SFTP_HOST }}
          username: ${{ secrets.SFTP_USERNAME }}
          password: ${{ secrets.SFTP_PASSWORD }}
          port: 22
          uploads: |
            output/ => ${{ secrets.SFTP_TARGET }}/

      # 📤 Upload ISOs to SourceForge
      - name: Upload to SourceForge
        if: github.event_name != 'pull_request' && steps.branch.outputs.is_stable == 'true'
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SFTP_HOST }}
          username: ${{ secrets.SFTP_USERNAME }}
          password: ${{ secrets.SFTP_PASSWORD }}
          script: |
            if [[ "${{ matrix.variant }}" == "nvidia" ]]; then
              sf-upload.sh --nvidia cosmic ${{ env.BUILD_DATE }}
            else
              sf-upload.sh cosmic ${{ env.BUILD_DATE }}
            fi
