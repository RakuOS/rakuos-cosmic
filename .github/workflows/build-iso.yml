name: Build ISOs

on:
  #schedule:
  #  - cron: '05 10 */14 * 2'
  workflow_dispatch:
    inputs:
      platform:
        required: true
        type: choice
        options:
          - amd64
          - arm64
  pull_request:
    branches:
      - main

env:
  IMAGE_NAME: ${{ github.event.repository.name }}
  IMAGE_REGISTRY: "ghcr.io/${{ github.repository_owner }}"
  DEFAULT_TAG: "latest"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}
  cancel-in-progress: true

jobs:
  build:
    name: Build ${{ matrix.variant }} ISO
    runs-on: ${{ inputs.platform == 'amd64' && 'ubuntu-24.04' || 'ubuntu-24.04-arm' }}

    strategy:
      fail-fast: false
      matrix:
        variant: [standard, nvidia]

    permissions:
      contents: write
      packages: write
      id-token: write

    steps:
      - name: Prepare environment
        run: |
          echo "IMAGE_REGISTRY=${IMAGE_REGISTRY,,}" >> ${GITHUB_ENV}
          echo "IMAGE_NAME=${IMAGE_NAME,,}" >> ${GITHUB_ENV}
          echo "USER_UID=$(id -u)" >> ${GITHUB_ENV}
          echo "USER_GID=$(id -g)" >> ${GITHUB_ENV}

      - name: Install dependencies (ARM only)
        if: inputs.platform == 'arm64'
        run: |
          sudo apt update -y
          sudo apt install -y podman

      - name: Maximize build space
        if: inputs.platform != 'arm64'
        uses: ublue-os/remove-unwanted-software@cc0becac701cf642c8f0a6613bbdaf5dc36b259e
        with:
          remove-codeql: true

      - name: Checkout
        uses: actions/checkout@v4

      - name: Lowercase Registry
        id: registry_case
        uses: ASzc/change-string-case-action@d0603cd0a7dd490be678164909f65c7737470a7f # v6
        with:
          string: ${{ env.IMAGE_REGISTRY }}

      - name: Setup RakuOS Repo
        id: setup-rakuos-repo
        shell: bash
        run: |
          curl -Lo ${{ github.workspace }}/rakuos.repo https://copr.fedorainfracloud.org/coprs/tohur/RakuOS/repo/fedora-43/tohur-RakuOS-fedora-43.repo

      # 🔥 Build ISO using build-container-installer
      - name: Build ISO
        id: build
        uses: jasonn3/build-container-installer@main
        with:
          arch: ${{ inputs.platform == 'amd64' && 'x86_64' || inputs.platform == 'arm64' && 'aarch64' || inputs.platform }}
          image_name: ${{ env.IMAGE_NAME }}${{ matrix.variant == 'nvidia' && '-nvidia' || '' }}
          image_repo: ${{ steps.registry_case.outputs.lowercase }}
          variant: "Kinoite"
          version: 43
          image_tag: ${{ env.DEFAULT_TAG }}
          iso_name: "${{ env.IMAGE_NAME }}${{ matrix.variant == 'nvidia' && '-nvidia' || '' }}-${{ env.DEFAULT_TAG }}-${{ inputs.platform }}.iso"
          enable_cache_dnf: "false"
          enable_cache_skopeo: "false"
          extra_boot_params: ""
          additional_templates: "/github/workspace/installer/lorax_templates/remove_spokes.tmpl"
          repos: '/github/workspace/rakuos.repo /etc/yum.repos.d/fedora.repo /etc/yum.repos.d/fedora-updates.repo'
          web_ui: "false"

      # 🔥 Rename ISO with UTC date
      - name: Rename ISO
        if: github.event_name != 'pull_request'
        shell: bash
        run: |
          cd ${{ steps.build.outputs.iso_path }}
          BUILD_DATE=$(date -u +%Y.%m.%d)
          if [[ "${{ matrix.variant }}" == "nvidia" ]]; then SUFFIX="-nvidia"; else SUFFIX=""; fi
          ISO_PATH=$(find . -type f -name "*.iso" | head -n 1)
          echo "Found ISO at $ISO_PATH"
          NEW_NAME="rakuos-cosmic${SUFFIX}-${BUILD_DATE}-${{ inputs.platform }}.iso"
          mv "$ISO_PATH" "$NEW_NAME"
          cp "$NEW_NAME" "rakuos-cosmic${SUFFIX}-latest-${{ inputs.platform }}.iso"
          echo "NEW_ISO_NAME=$NEW_NAME" >> $GITHUB_ENV
          echo "BUILD_DATE=$BUILD_DATE" >> $GITHUB_ENV

      # 🔥 Generate SHA256 checksums
      - name: Generate SHA256 checksum
        if: github.event_name != 'pull_request'
        shell: bash
        run: |
          cd ${{ steps.build.outputs.iso_path }}
          if [[ "${{ matrix.variant }}" == "nvidia" ]]; then SUFFIX="-nvidia"; else SUFFIX=""; fi
          sha256sum "$NEW_ISO_NAME" > "$NEW_ISO_NAME.sha256"
          sha256sum "rakuos-cosmic${SUFFIX}-latest-${{ inputs.platform }}.iso" > "rakuos-cosmic${SUFFIX}-latest-${{ inputs.platform }}.iso.sha256"

      # 📦 Upload artifacts to GitHub
      - name: Upload disk images and checksum to Job Artifacts
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: rakuos-cosmic-${{ matrix.variant }}-${{ inputs.platform }}
          path: |
            ${{ steps.build.outputs.iso_path }}/${{ env.NEW_ISO_NAME }}
            ${{ steps.build.outputs.iso_path }}/${{ env.NEW_ISO_NAME }}.sha256
          if-no-files-found: error
          retention-days: 7
          compression-level: 0
          overwrite: true

      # 🌐 Connect to ZeroTier
      - name: Join ZeroTier Network
        if: github.event_name != 'pull_request'
        uses: zerotier/github-action@v1
        with:
          network_id: ${{ secrets.ZEROTIER_NETWORK_ID }}
          auth_token: ${{ secrets.ZEROTIER_CENTRAL_TOKEN }}

      # ⏳ Wait for ZeroTier interface
      - name: Wait for ZeroTier IP
        if: github.event_name != 'pull_request'
        run: |
          sleep 10
          ip addr show
          ping -c 3 ${{ secrets.SFTP_HOST }}

      # 🗑️ Remove previous ISOs from server
      - name: Remove previous ISOs from server
        if: github.event_name != 'pull_request'
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SFTP_HOST }}
          username: ${{ secrets.SFTP_USERNAME }}
          password: ${{ secrets.SFTP_PASSWORD }}
          script: |
            SUFFIX=""
            [[ "${{ matrix.variant }}" == "nvidia" ]] && SUFFIX="-nvidia"
            cd "${{ secrets.SFTP_TARGET }}"
            rm -f rakuos-cosmic${SUFFIX}-[0-9]*-${{ inputs.platform }}.iso
            rm -f rakuos-cosmic${SUFFIX}-[0-9]*-${{ inputs.platform }}.iso.sha256
            rm -f rakuos-cosmic${SUFFIX}-latest-${{ inputs.platform }}.iso
            rm -f rakuos-cosmic${SUFFIX}-latest-${{ inputs.platform }}.iso.sha256

      # 🚀 Upload to SFTP
      - name: SFTP upload via ZeroTier
        if: github.event_name != 'pull_request'
        uses: Dylan700/sftp-upload-action@latest
        with:
          server: ${{ secrets.SFTP_HOST }}
          username: ${{ secrets.SFTP_USERNAME }}
          password: ${{ secrets.SFTP_PASSWORD }}
          port: 22
          uploads: |
            ${{ steps.build.outputs.iso_path }}/ => ${{ secrets.SFTP_TARGET }}/
          ignore: |
            .git
            .github
            build_files
            config
            disk_config
            flatpak.*
            installer
            system_files
            .gitignore
            rakuos.repo
            manifest-anaconda-iso.json
            bootiso
            LICENSE
            README.md
            CONTRIBUTING.md
            CONDUCT.md
            artifacthub-repo.yml
            cosign.pub
            *-CHECKSUM
            Containerfile
            Containerfile.nvidia

      # # 📤 Upload ISOs to SourceForge
      # - name: Upload to SourceForge
