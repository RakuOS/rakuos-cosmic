name: Build Live ISO (testing)

on:
  workflow_dispatch:
    inputs:
      platform:
        required: true
        type: choice
        options:
          - amd64
          - arm64
  pull_request:
    branches:
      - main

env:
  IMAGE_NAME: ${{ github.event.repository.name }}
  IMAGE_REGISTRY: "ghcr.io/${{ github.repository_owner }}"
  DEFAULT_TAG: "latest"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}
  cancel-in-progress: true

jobs:
  build-iso:
    runs-on: ubuntu-24.04

    steps:
      - name: Resolve branch
        id: branch
        env:
          SOURCE_BRANCH: ${{ github.ref_name }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          BRANCH_SLUG="$(echo "${SOURCE_BRANCH}" | tr '[:upper:]' '[:lower:]' | sed 's#[^a-z0-9._-]#-#g')"
          echo "branch_slug=${BRANCH_SLUG}" >> "$GITHUB_OUTPUT"
          if [[ "${SOURCE_BRANCH}" == "${DEFAULT_BRANCH}" ]]; then
            echo "image_tag=${{ env.DEFAULT_TAG }}" >> "$GITHUB_OUTPUT"
            echo "is_stable=true" >> "$GITHUB_OUTPUT"
          else
            echo "image_tag=${BRANCH_SLUG}" >> "$GITHUB_OUTPUT"
            echo "is_stable=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: ublue-os/remove-unwanted-software@v9

      - uses: actions/checkout@v4

      - name: Build ISO
        id: build
        uses: RakuOS/titanoboa@main
        with:
          image-ref: ghcr.io/rakuos/rakuos-cosmic:${{ steps.branch.outputs.image_tag }}
          hook-post-rootfs: ${{ github.workspace }}/config/configure-iso.sh
          hook-pre-initramfs: ${{ github.workspace }}/config/pre_initramfs.sh
          compression: squashfs
          builder-distro: fedora

      - name: Rename and Checksum ISO
        run: |
          BUILD_DATE=$(date -u +%Y.%m.%d)
          mkdir -p output
          if [[ "${{ steps.branch.outputs.is_stable }}" == "true" ]]; then
            ISO_NAME="rakuos-cosmic-${BUILD_DATE}-${{ inputs.platform }}.iso"
          else
            ISO_NAME="rakuos-cosmic-${{ steps.branch.outputs.branch_slug }}-${BUILD_DATE}-${{ inputs.platform }}.iso"
          fi
          mv ${{ steps.build.outputs.iso-dest }} output/${ISO_NAME}
          (cd output && sha256sum "${ISO_NAME}" | tee "${ISO_NAME}-CHECKSUM")

      # 📦 Upload artifacts to GitHub
      - name: Upload ISO
        uses: actions/upload-artifact@v4
        with:
          name: custom-iso-${{ steps.branch.outputs.branch_slug }}
          path: output/

