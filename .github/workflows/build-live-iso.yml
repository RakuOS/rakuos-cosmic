name: Build Live ISO

on:
  workflow_dispatch:
    inputs:
      platform:
        required: true
        type: choice
        options:
          - amd64
          - arm64
  pull_request:
    branches:
      - main

env:
  IMAGE_NAME: ${{ github.event.repository.name }}
  IMAGE_REGISTRY: "ghcr.io/${{ github.repository_owner }}"
  DEFAULT_TAG: "latest"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}
  cancel-in-progress: true

jobs:
  build-iso:
    runs-on: ubuntu-24.04

    steps:
      - uses: ublue-os/remove-unwanted-software@v9

      - uses: actions/checkout@v4

      - name: Build ISO
        id: build
        uses: ublue-os/titanoboa@main
        with:
          image-ref: ghcr.io/rakuos/rakuos-cosmic:latest
          hook-post-rootfs: ${{ github.workspace }}/config/configure-iso.sh
          hook-pre-initramfs: ${{ github.workspace }}/config/pre_initramfs.sh
          compression: squashfs
          builder-distro: fedora

      - name: Rename ISO + Generate SHA256
        run: |
          ISO_PATH="${{ steps.build.outputs.iso-dest }}"

          NEW_ISO="rakuos-cosmic-$(date +%Y%m%d).iso"

          mv "$ISO_PATH" "$NEW_ISO"
          sha256sum "$NEW_ISO" > "$NEW_ISO.sha256"

          mkdir -p output
          mv "$NEW_ISO" "$NEW_ISO.sha256" output/

          echo "NEW_ISO_NAME=$NEW_ISO" >> $GITHUB_ENV
          echo "OUTPUT_DIR=$(pwd)/output" >> $GITHUB_ENV

      # 📦 Upload artifacts to GitHub
      - name: Upload disk images and checksum to Job Artifacts
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: rakuos-cosmic-${{ inputs.platform }}
          path: |
            ${{ steps.build.outputs.iso-dest }}/${{ env.NEW_ISO_NAME }}
            ${{ steps.build.outputs.iso-dest }}/${{ env.NEW_ISO_NAME }}.sha256
          if-no-files-found: error
          retention-days: 7
          compression-level: 0
          overwrite: true


